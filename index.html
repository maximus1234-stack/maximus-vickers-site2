<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Maximus Vickers — FourMeasure</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0a0612;
    --bg-2:      #14082a;
    --surface:   #1a0f2e;
    --rule:      #2a1850;
    --primary:   #a855f7;
    --primary-2: #c084fc;
    --accent:    #ec4899;
    --text:      #ece4ff;
    --muted:     #9a85b8;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: "VT323", "Courier New", monospace;
    font-size: 20px;
    line-height: 1.4;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* CRT scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0) 0px,
      rgba(0,0,0,0) 2px,
      rgba(168,85,247,0.03) 2px,
      rgba(168,85,247,0.03) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* Soft purple ambient gradient backdrop */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(168,85,247,0.18) 0%, transparent 60%),
      radial-gradient(ellipse at 50% 100%, rgba(236,72,153,0.08) 0%, transparent 55%);
    pointer-events: none;
    z-index: -1;
  }

  /* HEADER */
  header {
    position: sticky;
    top: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1.5rem;
    flex-wrap: wrap;
    padding: 1.2rem 1.8rem;
    background: rgba(10,6,18,0.85);
    backdrop-filter: blur(8px);
    border-bottom: 2px solid var(--rule);
  }

  .brand {
    font-family: "Press Start 2P", monospace;
    font-size: 0.9rem;
    color: var(--text);
    text-decoration: none;
    letter-spacing: 0.06em;
    text-shadow:
      2px 2px 0 var(--accent),
      4px 4px 0 rgba(168,85,247,0.45);
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 1.6rem;
    flex-wrap: wrap;
  }

  nav ul {
    list-style: none;
    display: flex;
    gap: 1.4rem;
    align-items: center;
  }

  nav a {
    font-family: "Press Start 2P", monospace;
    font-size: 0.6rem;
    color: var(--muted);
    text-decoration: none;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    transition: color 0.2s, text-shadow 0.2s;
  }

  nav a:hover {
    color: var(--primary-2);
    text-shadow: 0 0 8px var(--primary);
  }

  /* HERO */
  .hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3.5rem 1.5rem 2.5rem;
    min-height: 70vh;
  }

  .eyebrow {
    font-family: "Press Start 2P", monospace;
    font-size: 0.6rem;
    color: var(--primary-2);
    letter-spacing: 0.22em;
    margin-bottom: 2rem;
    text-transform: uppercase;
    animation: blink 1.4s infinite step-start;
  }
  @keyframes blink { 50% { opacity: 0.3; } }

  /* CD */
  .cd-stage {
    position: relative;
    width: min(360px, 78vw);
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 2.4rem;
  }

  .cd-stage::before {
    content: '';
    position: absolute;
    inset: -14%;
    border-radius: 50%;
    background: radial-gradient(circle at center, rgba(168,85,247,0.35) 0%, transparent 60%);
    filter: blur(22px);
    pointer-events: none;
  }

  .cd {
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    animation: spin 5s linear infinite;
    filter: drop-shadow(0 0 22px rgba(168,85,247,0.55));
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .cd-disc {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background:
      conic-gradient(from 0deg,
        #1a0838, #581c87, #a855f7, #ec4899, #c026d3,
        #581c87, #2d1158, #7c3aed, #a855f7, #ec4899,
        #c026d3, #581c87, #1a0838);
    box-shadow:
      inset 0 0 50px rgba(0,0,0,0.7),
      0 0 0 4px #2a1850,
      0 0 0 8px #1a0f2e;
  }

  .cd-grooves {
    position: absolute;
    inset: 6%;
    border-radius: 50%;
    background:
      repeating-radial-gradient(
        circle at center,
        transparent 0,
        transparent 3px,
        rgba(0,0,0,0.18) 3px,
        rgba(0,0,0,0.18) 4px
      );
    pointer-events: none;
  }

  .cd-shine {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: linear-gradient(
      135deg,
      rgba(255,255,255,0.18) 0%,
      rgba(255,255,255,0) 35%,
      rgba(255,255,255,0) 65%,
      rgba(255,255,255,0.08) 100%
    );
    pointer-events: none;
  }

  .cd-label {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 32%;
    height: 32%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #c084fc, #581c87 70%, #2d1158);
    box-shadow:
      inset 0 0 12px rgba(0,0,0,0.5),
      0 0 0 2px #1a0f2e;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .cd-label-text {
    font-family: "Press Start 2P", monospace;
    font-size: 0.55rem;
    color: #fde9ff;
    letter-spacing: 0.05em;
    text-shadow: 1px 1px 0 #000;
  }

  .cd-hole {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 9%;
    height: 9%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: var(--bg);
    box-shadow:
      inset 0 0 0 2px var(--primary-2),
      inset 0 0 6px rgba(0,0,0,0.8);
  }

  .hero-tag {
    font-family: "VT323", monospace;
    font-size: 1.25rem;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-align: center;
    max-width: 30ch;
  }

  /* DESKTOP ICONS */
  .desktop-icons {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    flex-wrap: wrap;
    gap: 2.4rem;
    padding: 2.5rem 1.5rem 4rem;
    scroll-margin-top: 80px;
  }

  .dt-icon {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.7rem;
    text-decoration: none;
    color: var(--text);
    width: 110px;
    padding: 0.6rem 0.4rem;
    border: 2px dashed transparent;
    transition: border-color 0.15s;
  }

  .dt-icon-glyph {
    width: 64px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    border: 3px solid var(--primary);
    box-shadow: 4px 4px 0 var(--accent);
    color: var(--primary-2);
    transition: box-shadow 0.2s, color 0.2s, background 0.2s, transform 0.1s;
    image-rendering: pixelated;
  }

  .dt-icon-glyph svg {
    width: 70%;
    height: 70%;
    display: block;
  }

  .dt-icon-label {
    font-family: "Press Start 2P", monospace;
    font-size: 0.5rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-align: center;
    text-transform: uppercase;
    line-height: 1.6;
    transition: color 0.2s, text-shadow 0.2s;
  }

  .dt-icon:hover { border-color: var(--primary); }

  .dt-icon:hover .dt-icon-glyph {
    background: var(--primary);
    color: #fff;
    box-shadow:
      4px 4px 0 var(--accent),
      0 0 20px var(--primary),
      0 0 38px rgba(168,85,247,0.55);
  }

  .dt-icon:hover .dt-icon-label {
    color: var(--primary-2);
    text-shadow: 0 0 8px var(--primary);
  }

  .dt-icon:active .dt-icon-glyph {
    transform: translate(2px, 2px);
    box-shadow: 2px 2px 0 var(--accent);
  }

  /* FOOTER */
  footer {
    padding: 2rem 1.5rem;
    text-align: center;
    font-family: "VT323", monospace;
    color: var(--muted);
    font-size: 1rem;
    letter-spacing: 0.06em;
    border-top: 2px solid var(--rule);
  }

  footer .heart { color: var(--accent); }

  /* MOBILE */
  @media (max-width: 720px) {
    header { padding: 0.9rem 1rem; gap: 0.9rem; }
    .brand { font-size: 0.72rem; }
    .header-right { gap: 0.9rem; width: 100%; justify-content: flex-start; }
    nav ul { gap: 0.85rem; }
    nav a { font-size: 0.5rem; letter-spacing: 0.08em; }
    .hero { padding: 2.5rem 1rem 2rem; min-height: auto; }
    .eyebrow { font-size: 0.55rem; margin-bottom: 1.4rem; }
    .desktop-icons { gap: 1.2rem; padding: 1.5rem 1rem 3rem; }
    .dt-icon { width: 92px; padding: 0.4rem 0.3rem; gap: 0.5rem; }
    .dt-icon-glyph { width: 52px; height: 52px; box-shadow: 3px 3px 0 var(--accent); border-width: 2px; }
    .dt-icon-label { font-size: 0.45rem; line-height: 1.5; }
    footer { font-size: 0.9rem; }
  }

  @media (max-width: 420px) {
    nav ul { gap: 0.6rem; }
    nav a { font-size: 0.45rem; }
  }
</style>
</head>
<body>

<header>
  <a class="brand" href="index.html">MAXIMUS VICKERS</a>
  <div class="header-right">
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="#fourmeasure">FourMeasure</a></li>
