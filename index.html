<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Maximus Vickers — FourMeasure</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #4B1FD1;
    --bg-dark:   #1f0080;
    --bg-darker: #0d0040;
    --light:     #6b3fe0;
    --white:     #ffffff;
    --ink:       #f0e8ff;
    --black:     #000000;
    --hot:       #ff1adb;
    --yellow:    #fff200;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: none;
    background-color: var(--bg);
    color: var(--white);
    font-family: "VT323", "Courier New", monospace;
    font-size: 20px;
    line-height: 1.4;
    overflow-x: hidden;
  }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    padding: 2.4rem 1.5rem 1.4rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.6rem;
  }

  .brand {
    font-family: "Press Start 2P", monospace;
    font-size: clamp(0.95rem, 5.5vw, 2.6rem);
    text-align: center;
    letter-spacing: 0.04em;
    line-height: 1;
  }

  .brand a {
    color: #FFFFFF;
    text-decoration: none;
  }

  /* DESKTOP ICONS */
  .desktop-icons {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: clamp(1rem, 3vw, 2.5rem);
    padding: 1rem 1.5rem 0.3rem;
    margin-top: auto;
    scroll-margin-top: 60px;
  }

  .icon-link {
    display: inline-block;
    text-align: center;
    text-decoration: none;
    color: #FFFFFF;
    cursor: pointer;
    border: 0;
    background: transparent;
  }

  .icon-link img {
    display: block;
    width: clamp(48px, 11vw, 100px);
    height: clamp(48px, 11vw, 100px);
    object-fit: contain;
    margin: 0 auto;
    border: 0;
    background: transparent;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }

  .icon-link:hover img {
    transform: scale(1.08);
    box-shadow: 0 0 0 2px #FFFFFF, 0 0 8px rgba(255,255,255,0.6);
  }

  .icon-link:active img {
    transform: translateY(2px) scale(0.95);
    box-shadow: 0 0 0 1px #FFFFFF inset;
  }

  .icon-label {
    display: block;
    margin-top: 0.7rem;
    font-family: "Press Start 2P", monospace;
    font-size: clamp(0.55rem, 1.2vw, 0.7rem);
    color: #FFFFFF;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    line-height: 1.4;
  }

  /* FOOTER */
  footer {
    padding: 1.4rem 1.5rem;
    text-align: center;
    font-family: "Press Start 2P", monospace;
    color: var(--white);
    font-size: 0.55rem;
    letter-spacing: 0.14em;
    text-shadow: 2px 2px 0 var(--black);
    background: none;
    background-color: var(--bg);
    border-top: 4px solid var(--black);
  }

  /* MOBILE */
  @media (max-width: 720px) {
    header { padding: 1.5rem 1rem 1rem; }
    .brand { letter-spacing: 0.02em; }
    .desktop-icons { padding: 0.8rem 1rem 0.2rem; }
    footer { font-size: 0.5rem; padding: 1.2rem 1rem; }
  }

  /* SKATER */
  .ground-line {
    position: fixed;
    left: 0;
    right: 0;
    top: calc(50% + 90px);
    height: 2px;
    background: #FFFFFF;
    pointer-events: none;
    z-index: 4;
  }

  .skater {
    position: fixed;
    top: calc(50% - 90px);
    right: -200px;
    width: 162px;
    height: 180px;
    pointer-events: none;
    z-index: 5;
    animation: skate-across 8s linear infinite;
  }

  @keyframes skate-across {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-120vw); }
  }
</style>
</head>
<body>

<header>
  <h1 class="brand"><a href="index.html">MAXIMUS VICKERS</a></h1>
</header>

<section class="desktop-icons" id="fourmeasure" aria-label="Links">
  <a class="icon-link" href="https://www.instagram.com/maximussss__/" target="_blank" rel="noopener noreferrer">
    <img src="instagram-icon.png" alt="">
    <span class="icon-label">Instagram</span>
  </a>
  <a class="icon-link" href="https://www.linkedin.com/in/maximus-vickers-bb69672b1" target="_blank" rel="noopener noreferrer">
    <img src="linkedin-icon.png" alt="">
    <span class="icon-label">LinkedIn</span>
  </a>
  <a class="icon-link" href="https://apps.apple.com/us/app/fourmeasure/id6754608076" target="_blank" rel="noopener noreferrer">
    <img src="fourmeasure-icon.png" alt="">
    <span class="icon-label">FourMeasure</span>
  </a>
</section>

<footer>
  &copy; 2026 MAXIMUS VICKERS &middot; FOURMEASURE
</footer>

<div class="ground-line" aria-hidden="true"></div>
<svg class="skater" viewBox="0 0 90 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <g fill="#FFFFFF">
    <!-- Headphone band (thick curved arc over the head) -->
    <path d="M 32 18 Q 45 4 58 18 L 58 22 Q 45 10 32 22 Z"/>
    <!-- Head -->
    <circle cx="45" cy="22" r="10"/>
    <!-- Headphone ear pads -->
    <circle cx="32" cy="25" r="5"/>
    <circle cx="58" cy="25" r="5"/>
    <!-- Torso (leaning slightly forward) -->
    <path d="M 39 32 L 51 32 L 46 60 L 34 60 Z"/>
    <!-- Front arm (extended forward for balance) -->
    <path d="M 38 34 L 18 46 L 22 51 L 42 39 Z"/>
    <!-- Back arm (extended back for balance) -->
    <path d="M 52 34 L 72 24 L 75 29 L 54 39 Z"/>
    <!-- Front leg thigh (knee bent forward) -->
    <path d="M 34 60 L 40 60 L 33 75 L 28 75 Z"/>
    <!-- Front leg shin (foot planted on board) -->
    <path d="M 28 75 L 33 75 L 40 88 L 35 88 Z"/>
    <!-- Back leg thigh (knee bent backward) -->
    <path d="M 46 60 L 50 60 L 56 75 L 52 75 Z"/>
    <!-- Back leg shin (foot kicking back) -->
    <path d="M 52 75 L 56 75 L 70 80 L 66 84 Z"/>
    <!-- Skateboard deck (wider than the figure's feet) -->
    <rect x="22" y="88" width="48" height="4" rx="2"/>
    <!-- Wheels -->
    <circle cx="30" cy="97" r="3"/>
    <circle cx="62" cy="97" r="3"/>
  </g>
</svg>

</body>
</html>
