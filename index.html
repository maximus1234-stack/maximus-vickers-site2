<style>
  :root {
    --bg:        #4B1FD1;
    --bg-dark:   #1f0080;
    --bg-darker: #0d0040;
    --light:     #6b3fe0;
    --white:     #ffffff;
    --ink:       #f0e8ff;
    --black:     #000000;
    --hot:       #ff1adb;
    --yellow:    #fff200;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: none;
    background-color: var(--bg);
    color: var(--white);
    font-family: "VT323", "Courier New", monospace;
    font-size: 20px;
    line-height: 1.4;
    overflow-x: hidden;
  }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    padding: 2.4rem 1.5rem 1.4rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.6rem;
  }

  .brand {
    font-family: "Press Start 2P", monospace;
    font-size: clamp(0.95rem, 5.5vw, 2.6rem);
    text-align: center;
    letter-spacing: 0.04em;
    line-height: 1;
  }

  .brand a {
    color: #FFFFFF;
    text-decoration: none;
  }

  /* DESKTOP ICONS */
  .desktop-icons {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: clamp(1rem, 3vw, 2.5rem);
    padding: 1rem 1.5rem 0.3rem;
    margin-top: auto;
    scroll-margin-top: 60px;
  }

  .icon-link {
    display: inline-block;
    text-align: center;
    text-decoration: none;
    color: #FFFFFF;
    cursor: pointer;
    border: 0;
    background: transparent;
  }

  .icon-link img {
    display: block;
    width: clamp(48px, 11vw, 100px);
    height: clamp(48px, 11vw, 100px);
    object-fit: contain;
    margin: 0 auto;
    border: 0;
    background: transparent;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }

  .icon-link:hover img {
    transform: scale(1.08);
    box-shadow: 0 0 0 2px #FFFFFF, 0 0 8px rgba(255,255,255,0.6);
  }

  .icon-link:active img {
    transform: translateY(2px) scale(0.95);
    box-shadow: 0 0 0 1px #FFFFFF inset;
  }

  .icon-label {
    display: block;
    margin-top: 0.7rem;
    font-family: "Press Start 2P", monospace;
    font-size: clamp(0.55rem, 1.2vw, 0.7rem);
    color: #FFFFFF;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    line-height: 1.4;
  }

  /* FOOTER */
  footer {
    padding: 1.4rem 1.5rem;
    text-align: center;
    font-family: "Press Start 2P", monospace;
    color: var(--white);
    font-size: 0.55rem;
    letter-spacing: 0.14em;
    text-shadow: 2px 2px 0 var(--black);
    background: none;
    background-color: var(--bg);
    border-top: 4px solid var(--black);
  }

  /* MOBILE */
  @media (max-width: 720px) {
    header { padding: 1.5rem 1rem 1rem; }
    .brand { letter-spacing: 0.02em; }
    .desktop-icons { padding: 0.8rem 1rem 0.2rem; }
    footer { font-size: 0.5rem; padding: 1.2rem 1rem; }
  }

  /* SKATER */
  .ground-line {
    position: fixed;
    left: 0;
    right: 0;
    top: calc(50% + 90px);
    height: 2px;
    background: #FFFFFF;
    pointer-events: none;
    z-index: 4;
  }

  .skater-stage {
    position: fixed;
    top: calc(50% + 90px);
    left: 0;
    width: 100%;
    height: 0;
    animation: skate-across 8s linear infinite;
    will-change: transform;
    mix-blend-mode: lighten;
  }

  .skater {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 180px;
    width: auto;
    transform: translateY(20px);
    mix-blend-mode: lighten;
    filter: invert(1);
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
  }

  @keyframes skate-across {
    from { transform: translateX(100vw); }
    to   { transform: translateX(-200px); }
  }

  .notes {
    position: absolute;
    bottom: 145px;
    left: 80px;
    width: 0;
    height: 0;
    pointer-events: none;
  }

  .note {
    position: absolute;
    font-family: 'Arial', sans-serif;
    font-size: 32px;
    color: white;
    opacity: 0;
    animation: float-note 2s ease-out infinite;
    will-change: transform, opacity;
  }

  .note-1 { animation-delay: 0s; }
  .note-2 { animation-delay: 0.66s; }
  .note-3 { animation-delay: 1.33s; }

  @keyframes float-note {
    0% {
      transform: translate(0, 0) rotate(0deg);
      opacity: 0;
    }
    15% {
      opacity: 1;
    }
    100% {
      transform: translate(60px, -80px) rotate(15deg);
      opacity: 0;
    }
  }

  .moon-wrap {
    position: fixed;
    top: 180px;
    left: 50%;
    transform: translateX(-50%);
    width: 80px;
    height: 80px;
    z-index: 5;
  }

  .moon-outline {
    position: absolute;
    top: -3px;
    left: -3px;
    width: 86px;
    height: 86px;
    border: 2px solid white;
    border-radius: 50%;
    opacity: 0;
    animation: outline-toggle 16s steps(1, end) infinite;
  }

  .moon {
    position: relative;
    width: 80px;
    height: 80px;
    background: white;
    border-radius: 50%;
    overflow: hidden;
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
  }

  .crater {
    position: absolute;
    background: #c8c8c8;
    border-radius: 50%;
    z-index: 1;
  }

  .crater-1 { width: 14px; height: 14px; top: 18px; left: 20px; }
  .crater-2 { width: 8px;  height: 8px;  top: 14px; left: 50px; }
  .crater-3 { width: 10px; height: 10px; top: 42px; left: 40px; }
  .crater-4 { width: 6px;  height: 6px;  top: 52px; left: 18px; }
  .crater-5 { width: 7px;  height: 7px;  top: 30px; left: 60px; }

  .moon-shadow {
    position: absolute;
    top: 0;
    left: 0;
    width: 80px;
    height: 80px;
    background: #4B1FD1;
    border-radius: 50%;
    z-index: 2;
    animation: moon-phases 16s steps(1, end) infinite;
  }

  @keyframes moon-phases {
    0%    { transform: translateX(0); }
    12.5% { transform: translateX(20px); }
    25%   { transform: translateX(40px); }
    37.5% { transform: translateX(60px); }
    50%   { transform: translateX(80px); }
    62.5% { transform: translateX(-60px); }
    75%   { transform: translateX(-40px); }
    87.5% { transform: translateX(-20px); }
    100%  { transform: translateX(0); }
  }

  @keyframes outline-toggle {
    0%    { opacity: 1; }
    12.5% { opacity: 0; }
    25%   { opacity: 0; }
    37.5% { opacity: 0; }
    50%   { opacity: 1; }
    62.5% { opacity: 0; }
    75%   { opacity: 0; }
    87.5% { opacity: 0; }
    100%  { opacity: 1; }
  }

  /* TREE CONTAINERS - aligned to ground line */
  .trees {
    position: fixed;
    top: calc(50% + 90px);
    height: 0;
    z-index: 1;
    pointer-events: none;
  }

  .trees-left {
    left: 0;
    width: 40%;
  }

  .trees-right {
    right: 0;
    width: 40%;
  }

  .tree {
    position: absolute;
    width: auto;
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
    filter: brightness(0) invert(1);
    transform: scale(1.1);
    transform-origin: bottom center;
  }

  /* Palm trees on left - irregular spacing, varied size */
  .palm-1 { left: 8%;  height: 150px; bottom: -40px; }
  .palm-2 { left: 55%; height: 130px; bottom: -40px; }

  /* Pine trees on right - irregular spacing, varied size */
  .pine-1 { right: 6%;  height: 160px; bottom: -55px; }
  .pine-2 { right: 38%; height: 130px; bottom: -55px; }
  .pine-3 { right: 70%; height: 145px; bottom: -55px; }

  @media (max-width: 768px) {
    .trees-left {
      width: 50%;
    }
    .trees-right {
      width: 50%;
    }

    /* On mobile: only show 1 palm and 1 pine, hide the rest */
    .palm-2 {
      display: none;
    }
    .pine-2,
    .pine-3 {
      display: none;
    }

    /* Reposition the visible trees to the screen edges */
    .palm-1 {
      left: 8%;
      height: 110px;
      bottom: -30px;
    }
    .pine-1 {
      right: 8%;
      height: 120px;
      bottom: -45px;
    }

    /* Move the moon up a bit so it doesn't crowd the skater on small screens */
    .moon-wrap {
      top: 140px;
      width: 60px;
      height: 60px;
    }
    .moon, .moon-shadow {
      width: 60px;
      height: 60px;
    }
    .moon-outline {
      width: 66px;
      height: 66px;
    }
  }
</style>
