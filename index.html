<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Maximus Vickers — FourMeasure</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #3A00C8;
    --bg-dark:   #1f0080;
    --bg-darker: #0d0040;
    --light:     #6b3fe0;
    --white:     #ffffff;
    --ink:       #f0e8ff;
    --black:     #000000;
    --hot:       #ff1adb;
    --yellow:    #fff200;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--white);
    font-family: "VT323", "Courier New", monospace;
    font-size: 20px;
    line-height: 1.4;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    padding: 2.4rem 1.5rem 1.4rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.6rem;
  }

  .brand {
    font-family: "Press Start 2P", monospace;
    font-size: clamp(0.95rem, 5.5vw, 2.6rem);
    text-align: center;
    letter-spacing: 0.04em;
    line-height: 1;
  }

  .brand a {
    color: var(--white);
    text-decoration: none;
    text-shadow:
      0.15em 0.15em 0 var(--black),
      0.3em 0.3em 0 var(--hot);
  }

  /* NAV */
  nav ul {
    list-style: none;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.55rem;
  }

  .pixel-btn {
    display: inline-block;
    font-family: "Press Start 2P", monospace;
    font-size: 0.65rem;
    text-decoration: none;
    color: var(--white);
    background: var(--bg-dark);
    padding: 0.7rem 1rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border: 4px solid;
    border-color: var(--light) var(--black) var(--black) var(--light);
    cursor: pointer;
    user-select: none;
  }

  .pixel-btn:hover {
    background: var(--hot);
    color: var(--black);
    border-color: var(--white) var(--bg-darker) var(--bg-darker) var(--white);
  }

  .pixel-btn:active {
    border-color: var(--black) var(--light) var(--light) var(--black);
    transform: translate(1px, 1px);
  }

  /* HERO */
  .hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.5rem 1.5rem 2rem;
  }

  /* CD */
  .cd-stage {
    position: relative;
    width: min(340px, 80vw);
    aspect-ratio: 1;
    margin-bottom: 1.6rem;
    filter: drop-shadow(6px 6px 0 var(--black));
  }

  .cd {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    animation: spin 6s linear infinite;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .cd-disc {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: conic-gradient(from 0deg,
      #f0e8ff 0deg 22.5deg,
      #ff1adb 22.5deg 45deg,
      #a855f7 45deg 67.5deg,
      #1f0080 67.5deg 90deg,
      #f0e8ff 90deg 112.5deg,
      #ff1adb 112.5deg 135deg,
      #a855f7 135deg 157.5deg,
      #1f0080 157.5deg 180deg,
      #f0e8ff 180deg 202.5deg,
      #ff1adb 202.5deg 225deg,
      #a855f7 225deg 247.5deg,
      #1f0080 247.5deg 270deg,
      #f0e8ff 270deg 292.5deg,
      #ff1adb 292.5deg 315deg,
      #a855f7 315deg 337.5deg,
      #1f0080 337.5deg 360deg);
    box-shadow:
      inset 0 0 0 4px var(--black),
      0 0 0 4px var(--white),
      0 0 0 8px var(--black);
  }

  .cd-grooves {
    position: absolute;
    inset: 8%;
    border-radius: 50%;
    background:
      repeating-radial-gradient(
        circle at center,
        transparent 0,
        transparent 6px,
        rgba(0,0,0,0.45) 6px,
        rgba(0,0,0,0.45) 7px
      );
    pointer-events: none;
  }

  .cd-label {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 30%;
    height: 30%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: var(--black);
    box-shadow:
      0 0 0 2px var(--white),
      0 0 0 4px var(--black);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .cd-label-text {
    font-family: "Press Start 2P", monospace;
    font-size: 0.6rem;
    color: var(--white);
    letter-spacing: 0.05em;
  }

  .cd-hole {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 8%;
    height: 8%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: var(--bg);
    box-shadow: 0 0 0 2px var(--white);
  }

  .hero-tag {
    font-family: "VT323", monospace;
    font-size: 1.2rem;
    color: var(--ink);
    letter-spacing: 0.06em;
    text-align: center;
    text-shadow: 2px 2px 0 var(--black);
  }

  /* DESKTOP ICONS */
  .desktop-icons {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    flex-wrap: wrap;
    gap: 2rem;
    padding: 1.5rem 1.5rem 3rem;
    scroll-margin-top: 60px;
  }

  .dt-icon {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.7rem;
    text-decoration: none;
    color: var(--white);
    width: 100px;
    padding: 0.4rem 0.3rem 0;
  }

  .dt-icon-glyph {
    width: 64px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg-dark);
    color: var(--white);
    border: 4px solid;
    border-color: var(--light) var(--black) var(--black) var(--light);
    image-rendering: pixelated;
  }

  .dt-icon-glyph svg {
    width: 70%;
    height: 70%;
    display: block;
  }

  .dt-icon-label {
    font-family: "Press Start 2P", monospace;
    font-size: 0.5rem;
    color: var(--white);
    letter-spacing: 0.1em;
    text-align: center;
    text-transform: uppercase;
    line-height: 1.6;
    text-shadow: 2px 2px 0 var(--black);
    padding: 2px 4px;
  }

  .dt-icon:hover .dt-icon-glyph {
    background: var(--hot);
    color: var(--black);
    border-color: var(--white) var(--bg-darker) var(--bg-darker) var(--white);
  }

  .dt-icon:hover .dt-icon-label {
    background: var(--yellow);
    color: var(--black);
    text-shadow: none;
  }

  .dt-icon:active .dt-icon-glyph {
    border-color: var(--black) var(--light) var(--light) var(--black);
    transform: translate(1px, 1px);
  }

  /* FOOTER */
  footer {
    padding: 1.4rem 1.5rem;
    text-align: center;
    font-family: "Press Start 2P", monospace;
    color: var(--white);
    font-size: 0.55rem;
    letter-spacing: 0.14em;
    text-shadow: 2px 2px 0 var(--black);
    background: var(--bg-dark);
    border-top: 4px solid var(--black);
  }

  /* MOBILE */
  @media (max-width: 720px) {
    header { padding: 1.5rem 1rem 1rem; gap: 1.2rem; }
    .brand { letter-spacing: 0.02em; }
    .pixel-btn { font-size: 0.55rem; padding: 0.6rem 0.7rem; border-width: 3px; }
    nav ul { gap: 0.4rem; }
    .hero { padding: 1.4rem 1rem 1.8rem; }
    .cd-stage { width: min(280px, 78vw); filter: drop-shadow(4px 4px 0 var(--black)); }
    .desktop-icons { gap: 1.2rem; padding: 1rem 1rem 2rem; }
    .dt-icon { width: 88px; }
    .dt-icon-glyph { width: 56px; height: 56px; border-width: 3px; }
    .dt-icon-label { font-size: 0.45rem; }
    footer { font-size: 0.5rem; padding: 1.2rem 1rem; }
  }

  @media (max-width: 380px) {
    .pixel-btn { font-size: 0.5rem; padding: 0.5rem 0.6rem; }
    nav ul { gap: 0.35rem; }
  }
</style>
</head>
<body>

  <nav>
    <ul>
