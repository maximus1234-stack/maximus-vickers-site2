<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Maximus Vickers — FourMeasure</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #4B1FD1;
    --bg-dark:   #1f0080;
    --bg-darker: #0d0040;
    --light:     #6b3fe0;
    --white:     #ffffff;
    --ink:       #f0e8ff;
    --black:     #000000;
    --hot:       #ff1adb;
    --yellow:    #fff200;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: none;
    background-color: var(--bg);
    color: var(--white);
    font-family: "VT323", "Courier New", monospace;
    font-size: 20px;
    line-height: 1.4;
    overflow-x: hidden;
  }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    padding: 2.4rem 1.5rem 1.4rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.6rem;
  }

  .brand {
    font-family: "Press Start 2P", monospace;
    font-size: clamp(0.95rem, 5.5vw, 2.6rem);
    text-align: center;
    letter-spacing: 0.04em;
    line-height: 1;
  }

  .brand a {
    color: #FFFFFF;
    text-decoration: none;
  }

  /* DESKTOP ICONS */
  .desktop-icons {
    display: flex;
    justify-content: center;
    padding: 1rem 1.5rem 0.3rem;
    margin-top: auto;
    scroll-margin-top: 60px;
  }

  .icons-img-wrap {
    position: relative;
    width: 100%;
    max-width: 907px;
    line-height: 0;
  }

  .icons-img-wrap img {
    display: block;
    width: 100%;
    max-width: 100%;
    height: auto;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  .icon-link {
    position: absolute;
    top: 0;
    height: 100%;
    width: 33.3333%;
    cursor: pointer;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }

  .icon-link.l-ig  { left: 0; }
  .icon-link.l-li  { left: 33.3333%; }
  .icon-link.l-app { left: 66.6666%; }

  .icon-link:hover {
    transform: scale(1.08);
    box-shadow: 0 0 0 2px #FFFFFF, 0 0 8px rgba(255,255,255,0.6);
  }

  .icon-link:active {
    transform: translateY(2px) scale(0.95);
    box-shadow: 0 0 0 1px #FFFFFF inset;
  }

  /* FOOTER */
  footer {
    padding: 1.4rem 1.5rem;
    text-align: center;
    font-family: "Press Start 2P", monospace;
    color: var(--white);
    font-size: 0.55rem;
    letter-spacing: 0.14em;
    text-shadow: 2px 2px 0 var(--black);
    background: none;
    background-color: var(--bg);
    border-top: 4px solid var(--black);
  }

  /* MOBILE */
  @media (max-width: 720px) {
    header { padding: 1.5rem 1rem 1rem; }
    .brand { letter-spacing: 0.02em; }
    .desktop-icons { padding: 0.8rem 1rem 0.2rem; }
    footer { font-size: 0.5rem; padding: 1.2rem 1rem; }
  }
</style>
</head>
<body>

<header>
  <h1 class="brand"><a href="index.html">MAXIMUS VICKERS</a></h1>
</header>

<section class="desktop-icons" id="fourmeasure" aria-label="Links">
  <div class="icons-img-wrap">
    <img src="desktop-icons.png" alt="Instagram, LinkedIn, and FourMeasure App icons">
    <a class="icon-link l-ig"  href="https://www.instagram.com/maximussss__/"                 target="_blank" rel="noopener noreferrer" aria-label="Instagram"></a>
    <a class="icon-link l-li"  href="https://www.linkedin.com/in/maximus-vickers-bb69672b1"   target="_blank" rel="noopener noreferrer" aria-label="LinkedIn"></a>
    <a class="icon-link l-app" href="https://apps.apple.com/us/app/fourmeasure/id6754608076"  target="_blank" rel="noopener noreferrer" aria-label="FourMeasure App"></a>
  </div>
</section>

<footer>
  &copy; 2026 MAXIMUS VICKERS &middot; FOURMEASURE
</footer>

</body>
</html>
