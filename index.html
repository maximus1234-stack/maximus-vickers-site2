<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Maximus Vickers — FourMeasure</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #3A00C8;
    --bg-dark:   #1f0080;
    --bg-darker: #0d0040;
    --light:     #6b3fe0;
    --white:     #ffffff;
    --ink:       #f0e8ff;
    --black:     #000000;
    --hot:       #ff1adb;
    --yellow:    #fff200;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--white);
    font-family: "VT323", "Courier New", monospace;
    font-size: 20px;
    line-height: 1.4;
    overflow-x: hidden;
  }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    padding: 2.4rem 1.5rem 1.4rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.6rem;
  }

  .brand {
    font-family: "Press Start 2P", monospace;
    font-size: clamp(0.95rem, 5.5vw, 2.6rem);
    text-align: center;
    letter-spacing: 0.04em;
    line-height: 1;
  }

  .brand a {
    color: var(--white);
    text-decoration: none;
    text-shadow: 0.15em 0.15em 0 var(--black);
  }

  /* HERO */
  .hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    padding: 1.5rem 1.5rem 2rem;
  }

  /* CD */
  .cd-stage {
    position: relative;
    width: min(340px, 80vw);
    aspect-ratio: 1;
    filter: drop-shadow(6px 6px 0 var(--black));
  }

  .cd {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    animation: spin 6s linear infinite;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .cd-disc {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: conic-gradient(from 0deg,
      #ffffff 0deg 30deg,
      #b3e0ff 30deg 60deg,
      #c9a7ff 60deg 90deg,
      #ffb6d4 90deg 120deg,
      #fff48a 120deg 150deg,
      #8eedf3 150deg 180deg,
      #ffffff 180deg 210deg,
      #b3e0ff 210deg 240deg,
      #c9a7ff 240deg 270deg,
      #ffb6d4 270deg 300deg,
      #fff48a 300deg 330deg,
      #8eedf3 330deg 360deg);
    box-shadow:
      inset 0 0 0 3px rgba(0,0,0,0.35),
      0 0 0 4px var(--black);
  }

  .cd-grooves {
    position: absolute;
    inset: 8%;
    border-radius: 50%;
    background:
      repeating-radial-gradient(
        circle at center,
        transparent 0,
        transparent 6px,
        rgba(0,0,0,0.18) 6px,
        rgba(0,0,0,0.18) 7px
      );
    pointer-events: none;
  }

  .cd-label {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 26%;
    height: 26%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: #c0c0c0;
    box-shadow:
      inset 0 0 0 2px #8a8a8a,
      0 0 0 2px var(--black);
  }

  .cd-hole {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 8%;
    height: 8%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: var(--white);
    box-shadow: 0 0 0 2px var(--black);
  }

  /* DESKTOP ICONS */
  .desktop-icons {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    flex-wrap: wrap;
    gap: 2rem;
    padding: 1.5rem 1.5rem 3rem;
    scroll-margin-top: 60px;
  }

  .dt-icon {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.7rem;
    text-decoration: none;
    color: var(--white);
    width: 100px;
    padding: 0.4rem 0.3rem 0;
  }

  .dt-icon-glyph {
    width: 64px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg-dark);
    color: var(--white);
    border: 4px solid;
    border-color: var(--light) var(--black) var(--black) var(--light);
    image-rendering: pixelated;
  }

  .dt-icon-glyph svg {
    width: 70%;
    height: 70%;
    display: block;
  }

  .dt-icon-label {
    font-family: "Press Start 2P", monospace;
    font-size: 0.5rem;
    color: var(--white);
    letter-spacing: 0.1em;
    text-align: center;
    text-transform: uppercase;
    line-height: 1.6;
    text-shadow: 2px 2px 0 var(--black);
    padding: 2px 4px;
  }

  .dt-icon:hover .dt-icon-glyph {
    background: var(--hot);
    color: var(--black);
    border-color: var(--white) var(--bg-darker) var(--bg-darker) var(--white);
  }

  .dt-icon:hover .dt-icon-label {
    background: var(--yellow);
    color: var(--black);
    text-shadow: none;
  }

  .dt-icon:active .dt-icon-glyph {
    border-color: var(--black) var(--light) var(--light) var(--black);
    transform: translate(1px, 1px);
  }

  /* FOOTER */
  footer {
    padding: 1.4rem 1.5rem;
    text-align: center;
    font-family: "Press Start 2P", monospace;
    color: var(--white);
    font-size: 0.55rem;
    letter-spacing: 0.14em;
    text-shadow: 2px 2px 0 var(--black);
    background: var(--bg-dark);
    border-top: 4px solid var(--black);
  }

  /* MOBILE */
  @media (max-width: 720px) {
    header { padding: 1.5rem 1rem 1rem; }
    .brand { letter-spacing: 0.02em; }
    .hero { padding: 1.4rem 1rem 1.8rem; }
    .cd-stage { width: min(280px, 78vw); filter: drop-shadow(4px 4px 0 var(--black)); }
    .desktop-icons { gap: 1.2rem; padding: 1rem 1rem 2rem; }
    .dt-icon { width: 88px; }
    .dt-icon-glyph { width: 56px; height: 56px; border-width: 3px; }
    .dt-icon-label { font-size: 0.45rem; }
    footer { font-size: 0.5rem; padding: 1.2rem 1rem; }
  }
</style>
</head>
<body>

<header>
  <h1 class="brand"><a href="index.html">MAXIMUS VICKERS</a></h1>

<section class="hero">

      <div class="cd-disc"></div>
      <div class="cd-grooves"></div>
      <div class="cd-label"></div>

  </div>

<section class="desktop-icons" id="fourmeasure" aria-label="Links">
  <a class="dt-icon" href="https://www.instagram.com/maximussss__/" target="_blank" rel="noopener noreferrer">
    <span class="dt-icon-glyph" aria-hidden="true">
      <svg viewBox="0 0 14 14" shape-rendering="crispEdges" fill="currentColor">
        <rect x="2" y="1" width="10" height="2"/>
        <rect x="2" y="11" width="10" height="2"/>
        <rect x="1" y="2" width="2" height="10"/>
        <rect x="11" y="2" width="2" height="10"/>
        <rect x="5" y="4" width="4" height="1"/>

  <a class="dt-icon" href="https://www.linkedin.com/in/maximus-vickers-bb69672b1" target="_blank" rel="noopener noreferrer">
    <span class="dt-icon-glyph" aria-hidden="true">
      <svg viewBox="0 0 14 14" shape-rendering="crispEdges" fill="currentColor">

        <rect x="2" y="11" width="10" height="2"/>

  <a class="dt-icon" href="https://apps.apple.com/us/app/fourmeasure/id6754608076" target="_blank" rel="noopener noreferrer">
    <span class="dt-icon-glyph" aria-hidden="true">

<footer>

</footer>

</body>
</html>
